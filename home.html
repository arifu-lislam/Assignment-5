<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homepage</title>
    <!-- daisy + tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- google font geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="">
    <header>
      <div class="navbar bg-base-100 shadow-sm">
        <div class="flex-1">
          <a class="btn btn-ghost text-xl"
            ><i class="fa-brands fa-github"></i>GitHub Issues Tracker</a
          >
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Search"
            class="input input-bordered w-24 md:w-auto"
          />

          <div class="">
            <button class="btn btn-primary">
              <i class="fa-solid fa-plus"></i>New Issue
            </button>
          </div>
        </div>
      </div>
    </header>
    <main class="bg-base-200 min-h-screen">
      <section class="container w-11/12 mx-auto pt-10">
        <section class="button-section bg-white h-20 pt-5 pl-3.5 rounded-xl">
          <div class="flex gap-4 w-full">
            <button
              id="all-filter-btn"
              class="btn btn-active w-[100px] bg-blue-700 text-white"
            >
              All
            </button>
            <button id="open-filter-btn" class="btn btn-active w-[100px]">
              Open
            </button>
            <button id="closed-filter-btn" class="btn btn-active w-[100px]">
              Closed
            </button>
          </div>
        </section>
        <section class="filter bg-white h-20 pt-4 pl-3.5 rounded-xl mt-4">
          <div class="flex justify-between w-full">
            <div class="flex items-center gap-3">
              <img class="w-10 h-10" src="./assets/Aperture.png" alt="" />
              <div>
                <h3 class="text-2xl font-bold">50 Issues</h3>
                <p class="text-gray-500">
                  Track and manage your project issues
                </p>
              </div>
            </div>
            <div class="flex gap-5 items-center">
              <p>
                <span
                  class="h-3 w-3 rounded-full bg-green-500 inline-block"
                ></span>
                Open
              </p>
              <p>
                <span
                  class="h-3 w-3 rounded-full bg-[#A855F7] inline-block"
                ></span>
                Closed
              </p>
            </div>
          </div>
        </section>
        <section id="issue-container" class="grid grid-cols-4 gap-5"></section>

        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
          <div class="modal-box">
            <div id="details-container" class="">
              <h2>Fix navigation menu on mobile devices</h2>
              <button
                class="btn btn-primary bg-[#00A96E] rounded-full text-white"
              >
                Opened
              </button>
              <p>Opened by</p>
              <div class="flex">
                <button
                  class="btn btn-primary rounded-full bg-[#FEECEC] text-red-500"
                >
                  BUG
                </button>
                <button
                  class="btn btn-primary rounded-full bg-[#FDE68A] text-[#D97706]"
                >
                  HELP WANTED
                </button>
              </div>
              <p>
                The navigation menu doesn't collapse properly on mobile devices.
                Need to fix the responsive behavior.
              </p>
            </div>
            <div class="modal-action">
              <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn">Close</button>
              </form>
            </div>
          </div>
        </dialog>
      </section>
    </main>

    <script src="script/load-display.js"></script>
  </body>
</html>
